{% extends "base.html" %}

{% block title %}Edit Application{% endblock %}

{% block content %}
<h2>Edit Application</h2>

<div class="card">
    <form method="POST">
        <label for="company">Company Name</label>
        <input type="text" id="company" name="company" value="{{ application['company'] }}" required>

        <label for="job_title">Job Title</label>
        <input type="text" id="job_title" name="job_title" value="{{ application['job_title'] }}" required>

        <label for="status">Status</label>
        <select id="status" name="status">
            <option value="Applied" {% if application['status']=='Applied' %}selected{% endif %}>Applied</option>
            <option value="Interviewing" {% if application['status']=='Interviewing' %}selected{% endif %}>Interviewing</option>
            <option value="Rejected" {% if application['status']=='Rejected' %}selected{% endif %}>Rejected</option>
            <option value="Offer" {% if application['status']=='Offer' %}selected{% endif %}>Offer</option>
        </select>

        <label for="date_applied">Date Applied</label>
        <input type="date" id="date_applied" name="date_applied" value="{{ application['date_applied'] }}">

        <label for="notes">Notes</label>
        <textarea id="notes" name="notes" rows="5">{{ application['notes'] }}</textarea>

        <button type="submit">Update Application</button>
    </form>
</div>
{% endblock %}
